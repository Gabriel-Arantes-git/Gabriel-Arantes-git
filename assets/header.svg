<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="Gabriel Arantes - Software Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16150F"/>
      <stop offset="55%" stop-color="#1C1B19"/>
      <stop offset="100%" stop-color="#26221A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9C7B3E"/>
      <stop offset="50%" stop-color="#E6C988"/>
      <stop offset="100%" stop-color="#C9A86A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A86A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C9A86A" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="0.4"/></filter>
  </defs>

  <!-- base -->
  <rect width="1280" height="320" rx="18" fill="url(#bg)"/>
  <rect width="1280" height="320" rx="18" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g stroke="#C9A86A" stroke-width="0.6" opacity="0.07">
    <line x1="0" y1="64" x2="1280" y2="64"/>
    <line x1="0" y1="128" x2="1280" y2="128"/>
    <line x1="0" y1="192" x2="1280" y2="192"/>
    <line x1="0" y1="256" x2="1280" y2="256"/>
    <line x1="160" y1="0" x2="160" y2="320"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
    <line x1="1120" y1="0" x2="1120" y2="320"/>
  </g>

  <!-- floating code glyphs -->
  <g font-family="'JetBrains Mono', monospace" fill="#C9A86A">
    <text x="1050" y="80" font-size="26" opacity="0.16">&lt;/&gt;</text>
    <text x="120" y="280" font-size="22" opacity="0.13">{ }</text>
    <text x="1140" y="270" font-size="20" opacity="0.12">();</text>
    <text x="200" y="70" font-size="18" opacity="0.10">=&gt;</text>
    <g opacity="0.14" stroke="#C9A86A" stroke-width="1.6" fill="none" stroke-linecap="round">
      <circle cx="1000" cy="210" r="4"/><circle cx="1040" cy="235" r="4"/><circle cx="1000" cy="250" r="4"/>
      <path d="M1004 212 L1036 232 M1004 248 L1036 238"/>
    </g>
  </g>

  <!-- left accent bar -->
  <rect x="72" y="120" width="5" height="92" rx="2.5" fill="url(#gold)"/>

  <!-- prompt line -->
  <text x="96" y="118" font-family="'JetBrains Mono', monospace" font-size="17" fill="#8A7A5C">
    <tspan fill="#C9A86A">$</tspan> ./init --engineer<tspan fill="#C9A86A"><animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/> ▋</tspan>
  </text>

  <!-- name -->
  <text x="94" y="180" font-family="'Segoe UI', Arial, sans-serif" font-size="58" font-weight="800" fill="#ECE6DB" letter-spacing="-1">Gabriel Arantes</text>

  <!-- role with typing reveal -->
  <g font-family="'JetBrains Mono', monospace" font-size="20" fill="#C9A86A" font-weight="600">
    <text x="96" y="222">
      <tspan>Software Engineer</tspan>
      <tspan fill="#7A6A4F"> · Full Stack · Java | Spring | Angular</tspan>
    </text>
    <rect x="96" y="232" width="0" height="2" fill="url(#gold)">
      <animate attributeName="width" from="0" to="560" dur="1.6s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
    </rect>
  </g>

  <!-- tagline -->
  <text x="96" y="270" font-family="'Segoe UI', Arial, sans-serif" font-size="14.5" fill="#9C8E72" opacity="0">
    do requisito real à entrega de valor — proponho, construo e itero.
    <animate attributeName="opacity" from="0" to="1" dur="0.9s" begin="1.4s" fill="freeze"/>
  </text>

  <!-- corner frame accents -->
  <g stroke="url(#gold)" stroke-width="2" fill="none" opacity="0.55" stroke-linecap="round">
    <path d="M40 28 L40 16 L52 16"/>
    <path d="M1240 28 L1240 16 L1228 16"/>
    <path d="M40 292 L40 304 L52 304"/>
    <path d="M1240 292 L1240 304 L1228 304"/>
  </g>
</svg>
